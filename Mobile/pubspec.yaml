name: keep_it_green
description: Keep It Green — recycling rewards mobile app (user-facing).
publish_to: 'none'
version: 1.0.9+10

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_zxing: ^2.3.0        # QR scanning via ZXing C++ (no ML Kit / no Play Services)
  permission_handler: ^11.3.1
  intl: ^0.19.0
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

# App launcher icon (the Keep It Green leaf). Regenerate with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24
  adaptive_icon_background: "#18C964"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#0C3B2A"
    theme_color: "#18C964"
